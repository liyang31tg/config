
[window]
dynamic_title = true
decorations = "Transparent"
startup_mode = "Maximized"
option_as_alt = "Both"
blur=true

[font]
size = 16

[font.offset]
x = 0
y = 1

[font.normal]
# family = "MesloLGS NF"
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
# family = "MesloLGS NF"
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
# family = "MesloLGS NF"
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
# family = "MesloLGS NF"
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[env]
TERM = "xterm-256color"

[cursor]
blink_interval = 500

[cursor.style]
shape = "Beam"
blinking="Always"

[terminal.shell]
program = "/bin/zsh"
args = [ "--login" ,"-c", "zellij attach -c default" ]

# \u001b = ESC
[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

