[[keyboard.bindings]]
key = "H"
mods = "Command"
action = "None"

# 默认的行为会退出
[[keyboard.bindings]]
key = "q"
mods = "Control"
chars = "None"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
chars = "\u001b[28~"

[[keyboard.bindings]]
key = "T"
mods = "Command"
chars = "\u001b[25~"

[general]
live_config_reload = true
import = [ "~/.config/alacritty/themes/themes/nord.toml" ]
# import = [ "~/.config/alacritty/themes/themes/nord_light.toml" ]

[terminal]
