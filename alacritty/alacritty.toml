mods = "Control"
chars = "None"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
chars = "\u001b[28~"


[[keyboard.bindings]] #需要保留这个，arch的super+c = control+insert = 5~
key = "Insert"
mods = "Control"
action = "copy"

