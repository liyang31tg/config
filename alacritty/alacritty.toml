
[general]
live_config_reload = true
import = [ "~/.config/alacritty/themes/themes/nord.toml" ]
# import = [ "~/.config/alacritty/themes/themes/nord_light.toml" ]
[env]
TERM = "xterm-256color"
Where = "alacritty" #用作代表终端模拟器是alacritty

[window]
dynamic_title = true
decorations ="Buttonless" #"Transparent"
opacity = 1.0
startup_mode = "Maximized"
option_as_alt = "Both"
blur=true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 16

[font.offset]
x = 0
y = 0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"


[ bell ] #echo -e `\a`  触发响铃
animation = "EaseOutExpo"
duration = 200   # >0开启闪屏，毫秒
color = "#42a5f5"
command = "None"

# [ selection ]
# save_to_clipboard = true


[cursor]
blink_interval = 500
thickness = 0.15 #光标的宽度

[cursor.style]
shape = "Beam"
blinking="Always" #闪烁

[terminal.shell]
program = "/opt/homebrew/bin/zellij"
args = ["attach", "-c", "default" ]

[mouse]
hide_when_typing = true

[[keyboard.bindings]]
key = "F"
mods = "Command"
action = "ReceiveChar"


[[keyboard.bindings]]
key = ";"
mods = "Command"
action = "ToggleViMode"
mode = "~Alt"

# \u001b = ESC
[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

